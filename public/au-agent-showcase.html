<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Showcase — mySMB.com</title>
  <meta name="description" content="A growing library of intelligent agents built by the mySMB.com team — automating real workflows across Australian industries.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #34DFBA;
      --teal-dim:  rgba(52,223,186,.12);
      --teal-glow: rgba(52,223,186,.18);
      --dark:      #0F0F1A;
      --dark-mid:  #1A1A2E;
      --ink:       #1C1C28;
      --cream:     #F4F3EF;
      --muted:     #6B7280;
      --border:    rgba(0,0,0,.07);
      --border-lt: rgba(255,255,255,.08);
      --live:      #10B981;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--dark);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      border-bottom: 1px solid var(--border-lt);
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-mark {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: var(--dark); letter-spacing: -.01em;
      flex-shrink: 0;
    }
    .nav-wordmark {
      font-size: 14px; font-weight: 600; color: #fff;
      letter-spacing: -.01em; line-height: 1;
    }
    .nav-wordmark span { opacity: .35; font-weight: 400; }
    .nav-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--teal);
    }

    /* ── HERO ────────────────────────────────────────────────────────────────── */
    .hero {
      position: relative; overflow: hidden;
      min-height: 560px;
      display: flex; align-items: flex-end;
      background: var(--dark);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1800&q=80&auto=format&fit=crop');
      background-size: cover; background-position: center;
      opacity: .18;
      transform: scale(1.04);
      animation: heroZoom 20s ease-out forwards;
    }
    @keyframes heroZoom { to { transform: scale(1); } }
    .hero-gradient {
      position: absolute; inset: 0;
      background:
        linear-gradient(to top, var(--dark) 25%, transparent 70%),
        linear-gradient(to right, var(--dark) 0%, transparent 60%);
    }
    .hero-noise {
      position: absolute; inset: 0; opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .hero-content {
      position: relative; z-index: 2;
      padding: 72px 48px 60px;
      max-width: 800px;
      animation: fadeUp .8s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: none; } }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      color: var(--teal); margin-bottom: 24px;
      animation: fadeUp .8s .1s ease both;
    }
    .hero-eyebrow-line { width: 28px; height: 1.5px; background: var(--teal); }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(38px, 5.5vw, 64px);
      line-height: 1.05;
      color: #fff;
      margin-bottom: 22px;
      letter-spacing: -.01em;
      animation: fadeUp .8s .15s ease both;
    }
    .hero-title em {
      font-style: italic;
      color: var(--teal);
    }

    .hero-sub {
      font-size: 17px; color: rgba(255,255,255,.5);
      line-height: 1.65; max-width: 500px;
      animation: fadeUp .8s .2s ease both;
    }

    .hero-stats {
      position: absolute; bottom: 0; right: 0; z-index: 2;
      display: flex;
      animation: fadeUp .8s .3s ease both;
    }
    .hero-stat {
      padding: 22px 36px;
      background: rgba(255,255,255,.04);
      border-left: 1px solid var(--border-lt);
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .hero-stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 36px; color: var(--teal); display: block; line-height: 1;
    }
    .hero-stat-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: rgba(255,255,255,.35); display: block; margin-top: 5px;
    }

    /* ── SECTION LABEL ───────────────────────────────────────────────────────── */
    .section-label {
      display: flex; align-items: center; gap: 14px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin-bottom: 28px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── FEATURED ────────────────────────────────────────────────────────────── */
    .featured { padding: 60px 48px 48px; }

    .featured-grid {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      height: 480px;
    }

    .feat-card {
      position: relative; border-radius: 14px; overflow: hidden;
      background: var(--dark-mid);
      cursor: default;
    }
    .feat-card.large { grid-row: span 2; }

    .feat-photo {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: .4;
      transition: opacity .5s, transform .5s;
    }
    .feat-card:hover .feat-photo { opacity: .55; transform: scale(1.03); }

    .feat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, transparent 30%, rgba(15,15,26,.92) 75%);
    }
    .feat-card.large .feat-overlay {
      background: linear-gradient(to top, rgba(15,15,26,.97) 30%, transparent 70%);
    }

    .feat-industry {
      position: absolute; top: 18px; left: 18px; z-index: 2;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em;
      color: rgba(255,255,255,.45);
    }

    .feat-body {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      padding: 22px;
    }
    .feat-name {
      font-family: 'DM Serif Display', serif;
      color: #fff; line-height: 1.2;
    }
    .feat-card.large .feat-name { font-size: 26px; margin-bottom: 10px; }
    .feat-card.small .feat-name { font-size: 17px; }

    .feat-desc {
      font-size: 13px; color: rgba(255,255,255,.5);
      line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── FILTER BAR ──────────────────────────────────────────────────────────── */
    .filter-bar {
      padding: 0 48px 24px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .filter-pill {
      padding: 6px 16px; border-radius: 100px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px; font-weight: 500; color: var(--ink);
      cursor: pointer; white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }
    .filter-pill:hover { border-color: rgba(0,0,0,.15); }
    .filter-pill.active {
      background: var(--dark); color: #fff; border-color: var(--dark);
    }

    /* ── GRID ────────────────────────────────────────────────────────────────── */
    .grid-section { padding: 0 48px 80px; }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    .agent-card {
      background: #fff; border-radius: 12px;
      overflow: hidden; border: 1px solid var(--border);
      transition: box-shadow .2s, transform .2s;
    }
    .agent-card:hover {
      box-shadow: 0 10px 30px rgba(0,0,0,.09);
      transform: translateY(-3px);
    }

    .card-photo {
      height: 110px; position: relative;
      background-size: cover; background-position: center;
    }
    .card-photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 35%, rgba(15,15,26,.72));
    }
    .card-industry {
      position: absolute; bottom: 9px; left: 13px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      color: rgba(255,255,255,.65);
    }

    .card-body { padding: 15px 17px 17px; }
    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: 16px; color: var(--ink); line-height: 1.25; margin-bottom: 7px;
    }
    .card-desc {
      font-size: 12px; color: var(--muted); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      padding: 10px 17px; border-top: 1px solid var(--border);
      display: flex; align-items: center;
    }
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      color: var(--live);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--live);
      flex-shrink: 0;
      animation: livePulse 2.2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.45; transform:scale(.85); } }

    /* ── EMPTY / LOADING ─────────────────────────────────────────────────────── */
    .state-msg {
      grid-column: 1/-1; padding: 48px;
      text-align: center; color: var(--muted); font-size: 14px;
    }
    .skeleton {
      background: linear-gradient(90deg, #e8e8e8 25%, #f4f4f4 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card { height: 200px; border-radius: 12px; }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .nav { padding: 0 20px; }
      .hero-content { padding: 48px 24px 48px; }
      .hero-stats { position: static; margin-top: 32px; }
      .hero { flex-direction: column; align-items: stretch; }
      .featured { padding: 40px 24px 32px; }
      .featured-grid { grid-template-columns: 1fr; grid-template-rows: 280px 180px 180px; height: auto; }
      .feat-card.large { grid-row: span 1; }
      .filter-bar { padding: 0 24px 20px; }
      .grid-section { padding: 0 24px 60px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-brand" href="https://mysmb.com" target="_blank" rel="noopener">
    <div class="nav-mark">M</div>
    <div class="nav-wordmark">mySMB.com <span>/ AI Studio</span></div>
  </a>
  <span class="nav-label">Agent Showcase</span>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-noise"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">
      <span class="hero-eyebrow-line"></span>
      AI Studio · mySMB.com
    </div>
    <h1 class="hero-title">AI agents, <em>built</em><br>and live in the wild.</h1>
    <p class="hero-sub">A growing library of intelligent agents built by the mySMB.com team — automating real workflows across Australian industries.</p>
  </div>
  <div class="hero-stats">
    <div class="hero-stat">
      <span class="hero-stat-num" id="statAgents">—</span>
      <span class="hero-stat-label">Agents live</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-num" id="statIndustries">—</span>
      <span class="hero-stat-label">Industries</span>
    </div>
  </div>
</section>

<!-- FEATURED -->
<section class="featured" id="featuredSection" style="display:none">
  <div class="section-label">Featured agents</div>
  <div class="featured-grid" id="featuredGrid"></div>
</section>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar" style="display:none"></div>

<!-- GRID -->
<section class="grid-section">
  <div class="section-label" id="gridLabel">All live agents</div>
  <div class="agent-grid" id="agentGrid">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
</section>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_URL = 'https://agentcatalog-h0bpacatgndybfdz.australiaeast-01.azurewebsites.net/api/agents';

const SHOWCASE_CONFIG = {
  featured: [
    'Lease Renewal Reminder Agent',
    'BAS Preparation Checklist Agent',
    'Employee Onboarding Orchestrator',
  ]
};

const INDUSTRY_META = {
  'Financial Services':           { photo: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=900&q=75&auto=format&fit=crop' },
  'Property & Real Estate':       { photo: 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=900&q=75&auto=format&fit=crop' },
  'Healthcare & Aged Care':       { photo: 'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=900&q=75&auto=format&fit=crop' },
  'Legal & Professional Services':{ photo: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=900&q=75&auto=format&fit=crop' },
  'Education':                    { photo: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=900&q=75&auto=format&fit=crop' },
  'Retail & eCommerce':           { photo: 'https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=900&q=75&auto=format&fit=crop' },
  'Government & Local Council':   { photo: 'https://images.unsplash.com/photo-1541872703-74c5e44368f9?w=900&q=75&auto=format&fit=crop' },
  'Construction & Trades':        { photo: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=900&q=75&auto=format&fit=crop' },
  'Agriculture & Agribusiness':   { photo: 'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=900&q=75&auto=format&fit=crop' },
  'HR & Workforce':               { photo: 'https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=900&q=75&auto=format&fit=crop' },
};

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const photo = ind => (INDUSTRY_META[ind] || {}).photo || 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=900&q=75&auto=format&fit=crop';

// ── STATE ─────────────────────────────────────────────────────────────────────
let ALL_AGENTS   = [];
let activeFilter = 'all';

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderFeatured(agents) {
  const featuredNames = new Set(SHOWCASE_CONFIG.featured.map(n => n.toLowerCase()));
  const featured = SHOWCASE_CONFIG.featured
    .map(name => agents.find(a => a['Agent Name'].toLowerCase() === name.toLowerCase()))
    .filter(Boolean)
    .slice(0, 3);

  if (!featured.length) return;

  const section = document.getElementById('featuredSection');
  const grid    = document.getElementById('featuredGrid');
  section.style.display = '';

  grid.innerHTML = featured.map((a, i) => {
    const isLarge = i === 0;
    const name    = a['Agent Name'];
    const ind     = a['Industry'] || '';
    const desc    = a['Description'] || '';
    return `
      <div class="feat-card ${isLarge ? 'large' : 'small'}">
        <div class="feat-photo" style="background-image:url('${esc(photo(ind))}')"></div>
        <div class="feat-overlay"></div>
        <span class="feat-industry">${esc(ind)}</span>
        <div class="feat-body">
          <div class="feat-name">${esc(name)}</div>
          ${isLarge ? `<div class="feat-desc">${esc(desc)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return featuredNames;
}

function renderFilters(agents) {
  const bar = document.getElementById('filterBar');
  const industries = [...new Set(agents.map(a => a['Industry']).filter(Boolean))].sort();
  bar.style.display = 'flex';
  bar.innerHTML = `<button class="filter-pill active" data-ind="all" onclick="setFilter('all',this)">All industries</button>` +
    industries.map(ind => `<button class="filter-pill" data-ind="${esc(ind)}" onclick="setFilter('${esc(ind)}',this)">${esc(ind)}</button>`).join('');
}

function renderGrid() {
  const featuredNames = new Set(SHOWCASE_CONFIG.featured.map(n => n.toLowerCase()));
  const filtered = ALL_AGENTS.filter(a => {
    if (featuredNames.has((a['Agent Name'] || '').toLowerCase())) return false;
    if (activeFilter !== 'all' && a['Industry'] !== activeFilter) return false;
    return true;
  });

  const label = document.getElementById('gridLabel');
  const grid  = document.getElementById('agentGrid');

  label.textContent = `All live agents${activeFilter !== 'all' ? ` — ${activeFilter}` : ''} (${filtered.length})`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="state-msg">No agents found for this industry.</div>';
    return;
  }

  grid.innerHTML = filtered.map((a, idx) => {
    const name = a['Agent Name'] || '';
    const ind  = a['Industry']   || '';
    const desc = a['Description'] || '';
    return `
      <div class="agent-card" style="animation: fadeUp .4s ${(idx % 12) * 0.04}s ease both">
        <div class="card-photo" style="background-image:url('${esc(photo(ind))}')">
          <div class="card-photo-overlay"></div>
          <span class="card-industry">${esc(ind)}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${esc(name)}</div>
          <div class="card-desc">${esc(desc)}</div>
        </div>
        <div class="card-footer">
          <span class="live-badge"><span class="live-dot"></span> Live</span>
        </div>
      </div>`;
  }).join('');
}

function setFilter(ind, btn) {
  activeFilter = ind;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.ind === ind));
  renderGrid();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res  = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    ALL_AGENTS = data
      .map(a => ({
        'Agent Name':  a.title || a['Agent Name'] || '',
        'Industry':    a.industry || a['Industry'] || '',
        'Description': a.description || a['Description'] || '',
        'Status':      a.status || a['Status'] || '',
      }))
      .filter(a => a['Status'] === 'available');

    // Stats
    const industries = new Set(ALL_AGENTS.map(a => a['Industry']).filter(Boolean));
    document.getElementById('statAgents').textContent     = ALL_AGENTS.length;
    document.getElementById('statIndustries').textContent = industries.size;

    renderFeatured(ALL_AGENTS);
    renderFilters(ALL_AGENTS);
    renderGrid();

  } catch (err) {
    document.getElementById('agentGrid').innerHTML =
      `<div class="state-msg">Could not load agents. Please try again later.</div>`;
    console.error(err);
  }
}

load();
</script>
</body>
</html>
